<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SGE — Master Satuan</title>
  <link rel="stylesheet" href="../../css/style.css" />
</head>
<body>
  <div id="nav"></div>

  <div class="page-wrapper">
    <div class="topbar">
      <span class="topbar-title">Master Data — Satuan</span>
      <span class="text-muted font-mono" id="count" style="font-size:11px;">&mdash;</span>
    </div>

    <div class="main-content">
      <div class="toolbar">
        <input type="text" id="search" class="search-input" placeholder="Cari satuan..." oninput="refreshTable()" />
        <button class="btn btn-primary" onclick="openCreateModal()">+ Tambah Satuan</button>
      </div>

      <div class="table-wrap" id="table-wrap">
        <div class="table-empty">Memuat data...</div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-overlay" style="display:none;">
    <div class="modal-box" style="max-width:420px;">
      <p class="modal-title" id="modal-title">Tambah Satuan</p>
      <form id="satuan-form">
        <div class="form-group">
          <label for="nama_satuan">Nama Satuan *</label>
          <input type="text" id="nama_satuan" required />
        </div>

        <p id="form-error" class="text-red" style="font-size:13px; margin-bottom:12px; display:none;"></p>

        <div class="modal-footer">
          <button type="button" class="btn" onclick="closeModal('modal-overlay')">Batal</button>
          <button type="submit" class="btn btn-primary">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../../js/api.js"></script>
  <script src="../../js/icons.js"></script>
  <script src="../../js/components.js"></script>
  <script src="../../js/nav.js"></script>
  <script>
    renderNav("master-satuan");

    let allSatuan = [];
    let editingId = null;

    const TABLE_ID = "satuan";
    const COLUMNS = [
      { key: "id", label: "No" },
      { key: "nama_satuan", label: "Nama Satuan" },
    ];

    async function init() {
      const response = await apiFetch("/satuan/");
      if (!response) return;
      allSatuan = await response.json();

      window.currentTableAllData = () => allSatuan;
      window.currentTableColumns = COLUMNS;
      window.currentTableRefresh = refreshTable;

      refreshTable();
    }

    function refreshTable() {
      const searchValue = document.getElementById("search").value;
      const data = processTableData(TABLE_ID, allSatuan, searchValue, ["nama_satuan"], COLUMNS);
      document.getElementById("count").textContent = `${data.length} satuan`;
      renderTable(data);
    }

    function renderTable(data) {
      const wrap = document.getElementById("table-wrap");
      if (data.length === 0) {
        wrap.innerHTML = `<div class="table-empty">Belum ada data satuan</div>`;
        return;
      }

      const desktopTable = `
        <table class="data-table">
          <thead>
            <tr>
              ${sortableHeader(TABLE_ID, COLUMNS[0])}
              ${sortableHeader(TABLE_ID, COLUMNS[1])}
              <th class="text-right">Aksi</th>
            </tr>
          </thead>
          <tbody>
            ${data.map(s => `
              <tr>
                <td class="mono">${s.id}</td>
                <td>${s.nama_satuan}</td>
                <td class="text-right">${actionButtons(`openEditModal(${s.id})`, `deleteSatuan(${s.id})`)}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;

      const mobileCards = `
        <div class="mobile-cards">
          ${data.map(s => `
            <div class="mobile-card">
              ${mobileCardRow("No", s.id, true)}
              ${mobileCardRow("Nama Satuan", s.nama_satuan)}
              ${actionButtonsMobile(`openEditModal(${s.id})`, `deleteSatuan(${s.id})`)}
            </div>
          `).join("")}
        </div>
      `;

      wrap.innerHTML = desktopTable + mobileCards;
    }

    function openCreateModal() {
      editingId = null;
      document.getElementById("modal-title").textContent = "Tambah Satuan";
      document.getElementById("satuan-form").reset();
      hideFormError("form-error");
      openModal("modal-overlay");
    }

    function openEditModal(id) {
      const satuan = allSatuan.find(s => s.id === id);
      if (!satuan) return;
      editingId = id;
      document.getElementById("modal-title").textContent = "Edit Satuan";
      hideFormError("form-error");
      document.getElementById("nama_satuan").value = satuan.nama_satuan;
      openModal("modal-overlay");
    }

    document.getElementById("satuan-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const payload = { nama_satuan: document.getElementById("nama_satuan").value };

      hideFormError("form-error");

      const isEdit = editingId !== null;
      const response = await apiFetch(
        isEdit ? `/satuan/${editingId}` : "/satuan/",
        { method: isEdit ? "PUT" : "POST", body: JSON.stringify(payload) }
      );
      if (!response) return;

      if (!response.ok) {
        const data = await response.json();
        showFormError("form-error", data.detail || "Gagal menyimpan data");
        return;
      }

      closeModal("modal-overlay");
      init();
    });

    async function deleteSatuan(id) {
      const satuan = allSatuan.find(s => s.id === id);
      if (!confirmDelete("satuan", satuan.nama_satuan)) return;
      const response = await apiFetch(`/satuan/${id}`, { method: "DELETE" });
      if (!response) return;
      if (!response.ok) { alert("Gagal menghapus data — kemungkinan masih dipakai Material"); return; }
      init();
    }

    init();
  </script>
</body>
</html>
