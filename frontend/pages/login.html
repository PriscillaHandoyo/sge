<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SGE — Login</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div style="height:100vh; display:flex; align-items:center; justify-content:center;">
    <div class="card" style="width:100%; max-width:360px; padding:32px;">

      <div style="margin-bottom:28px;">
        <span class="logo-text" style="opacity:1; font-size:18px;">SGE</span>
        <p class="text-muted" style="font-size:13px; margin-top:4px;">Webapp Manajemen Pabrik</p>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required autocomplete="current-password" />
        </div>

        <p id="login-error" class="text-red" style="font-size:13px; margin-bottom:12px; display:none;"></p>

        <button type="submit" class="btn btn-primary" style="width:100%; padding:11px; font-size:13px;">
          Masuk
        </button>
      </form>

    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();

      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;
      const errorEl = document.getElementById("login-error");
      errorEl.style.display = "none";

      try {
        const response = await fetch(API_BASE + "/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: new URLSearchParams({ username, password }),
        });

        const data = await response.json();

        if (!response.ok) {
          errorEl.textContent = data.detail || "Login gagal";
          errorEl.style.display = "block";
          return;
        }

        setToken(data.access_token);
        window.location.href = "/pages/dashboard.html";
      } catch (err) {
        errorEl.textContent = "Tidak bisa terhubung ke server. Pastikan backend jalan.";
        errorEl.style.display = "block";
      }
    });
  </script>
</body>
</html>
