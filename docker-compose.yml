services:
  postgres:
    image: postgres:16
    container_name: sge-postgres
    environment:
      POSTGRES_USER: sge
      POSTGRES_PASSWORD: sge
      POSTGRES_DB: sge
    volumes:
      - sge-pgdata:/var/lib/postgresql/data
    networks:
      sge-net:
        ipv4_address: 172.21.0.2
    restart: always

  backend:
    build: ./backend
    container_name: sge-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001
    # Tetap gunakan port 8001 untuk membedakan dengan espe
    ports:
      - "127.0.0.1:8001:8001"
    environment:
      - DATABASE_URL=postgresql://sge:sge@172.21.0.2:5432/sge
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
    networks:
      sge-net:
        ipv4_address: 172.21.0.3
    restart: always

  caddy:
    image: caddy:alpine
    container_name: sge-caddy
    ports:
      - "3003:3003"
    volumes:
      - ./frontend:/srv:ro
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      sge-net:
        ipv4_address: 172.21.0.4
    restart: always

networks:
  sge-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16

volumes:
  sge-pgdata:
