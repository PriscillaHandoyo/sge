services:
  sge-db:
    image: postgres:16
    container_name: sge-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sge
      POSTGRES_USER: sge
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - sge-db-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - sge-net

  sge-backend:
    build: ./backend
    container_name: sge-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://sge:${DB_PASSWORD}@sge-db:5432/sge
      POSTGRES_USER: sge
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: sge
      POSTGRES_PORT: "5432"
      POSTGRES_HOST: sge-db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "120"
    depends_on:
      - sge-db
    networks:
      - sge-net

  sge-frontend:
    image: caddy:alpine
    container_name: sge-frontend
    restart: unless-stopped
    ports:
      - "2053:2053"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./frontend:/srv/frontend
    depends_on:
      - sge-backend
    networks:
      - sge-net

networks:
  sge-net:
    driver: bridge

volumes:
  sge-db-data:
